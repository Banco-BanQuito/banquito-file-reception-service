name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: banquito-repo
  SERVICE: file-reception-service
  PORT: 8084

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: Batch/pom.xml

      - name: Run tests
        working-directory: Batch
        run: |
          chmod +x ./mvnw
          ./mvnw -q test

  docker-deploy:
    name: Build Docker & Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.GCP_SA_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'kubectl,gke-gcloud-auth-plugin'

      - name: Build and push to Artifact Registry
        run: |
          if [ ! -d Batch/src ]; then
            echo "::warning::No hay Batch/src/ - sube el codigo fuente al repositorio"
            exit 0
          fi
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:latest \
            .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:latest

      - name: Push to GHCR
        run: |
          if [ ! -d Batch/src ]; then exit 0; fi
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:latest \
            ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE }}:latest

      - name: Deploy to GKE
        run: |
          if [ ! -d Batch/src ]; then exit 0; fi
          gcloud container clusters get-credentials banquito-cluster --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }}
          kubectl set image deployment/${{ env.SERVICE }} ${{ env.SERVICE }}=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          kubectl rollout status deployment/${{ env.SERVICE }} --timeout=120s
